<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Autopilot</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --red: #ff2f3e;
      --yellow: #ffd43a;
      --green: #49db66;
      --blue: #3e9cff;
    }
    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 24%, transparent 24%, transparent 48%, rgba(255,255,255,0.025) 48%, rgba(255,255,255,0.008) 72%, transparent 72%),
        radial-gradient(circle at 20% 0%, rgba(140,0,0,0.45), transparent 30%),
        radial-gradient(circle at 100% 100%, rgba(90,110,0,0.18), transparent 28%),
        linear-gradient(135deg, #140508 0%, #090b10 50%, #10190f 100%);
      background-attachment: fixed;
      overflow-x: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(135deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 42px, transparent 42px, transparent 84px);
      pointer-events: none;
      mix-blend-mode: screen;
      opacity: 0.45;
    }
    .wrap {
      width: min(100%, 520px);
      margin: 0 auto;
      padding: 22px 16px 48px;
      position: relative;
      z-index: 1;
    }
    .title {
      text-align: center;
      font-size: clamp(52px, 14vw, 88px);
      line-height: 0.92;
      font-weight: 900;
      letter-spacing: 5px;
      margin: 8px 0 10px;
      text-transform: uppercase;
      text-shadow: 0 2px 18px rgba(0,0,0,0.35);
    }
    .title span:nth-child(1), .title span:nth-child(6) { color: var(--red); }
    .title span:nth-child(2), .title span:nth-child(7) { color: var(--yellow); }
    .title span:nth-child(3), .title span:nth-child(8) { color: var(--green); }
    .title span:nth-child(4), .title span:nth-child(9) { color: var(--blue); }
    .title span:nth-child(5) { color: var(--red); }
    .tagline {
      text-align: center;
      color: rgba(255,255,255,0.42);
      font-size: 13px;
      letter-spacing: 5px;
      text-transform: uppercase;
      margin-bottom: 26px;
    }
    .hero {
      display: flex;
      justify-content: center;
      margin-bottom: 24px;
      position: relative;
    }
    .ring {
      width: min(78vw, 340px);
      aspect-ratio: 1;
      border-radius: 50%;
      padding: 11px;
      background: conic-gradient(var(--blue) 0 19%, var(--red) 19% 45%, var(--yellow) 45% 57%, var(--green) 57% 74%, var(--blue) 74% 100%);
      box-shadow: 0 0 25px rgba(70,155,255,0.16), 0 0 50px rgba(255,50,50,0.12);
      position: relative;
      animation: float 3.6s ease-in-out infinite;
    }
    .ring::before {
      content: "";
      position: absolute;
      inset: 11px;
      border-radius: 50%;
      background: #ffffff;
      z-index: 0;
    }
    .face {
      position: absolute;
      inset: 18px;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      overflow: hidden;
    }
    .face img {
      width: 82%;
      max-width: 250px;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,0.18));
    }
    .propeller {
      position: absolute;
      left: 50%;
      top: -38px;
      width: 14px;
      height: 72px;
      transform: translateX(-50%);
      z-index: 3;
    }
    .propeller .stem {
      position: absolute;
      left: 50%;
      bottom: 14px;
      width: 4px;
      height: 28px;
      background: #111;
      transform: translateX(-50%);
      border-radius: 3px;
    }
    .propeller .blade-wrap {
      position: absolute;
      left: 50%;
      top: 0;
      width: 70px;
      height: 70px;
      transform: translateX(-50%);
      animation: spin 1.4s linear infinite;
    }
    .propeller .blade-wrap::before,
    .propeller .blade-wrap::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 56px;
      height: 14px;
      border-radius: 999px;
      background: linear-gradient(90deg, #66d4ff, #3ea7ff);
      transform-origin: center center;
      box-shadow: 0 0 10px rgba(62,156,255,0.35);
    }
    .propeller .blade-wrap::before { transform: translate(-50%, -50%) rotate(0deg); }
    .propeller .blade-wrap::after { transform: translate(-50%, -50%) rotate(90deg); }
    .propeller .hub, .propeller .ball {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 50%;
      background: var(--red);
    }
    .propeller .hub { top: 30px; width: 12px; height: 12px; }
    .propeller .ball { bottom: 4px; width: 16px; height: 16px; box-shadow: 0 0 12px rgba(255,47,62,0.4); }
    .ca-box {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 14px;
      align-items: center;
      background: rgba(255,255,255,0.045);
      border: 1px solid rgba(255,255,255,0.14);
      backdrop-filter: blur(10px);
      border-radius: 22px;
      padding: 18px 18px;
      margin: 0 0 26px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03);
    }
    .ca-label {
      color: rgba(255,255,255,0.5);
      font-weight: 800;
      letter-spacing: 4px;
      font-size: 13px;
    }
    .ca-text {
      font-size: 14px;
      color: rgba(255,255,255,0.72);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .copy-btn {
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.07);
      color: white;
      border-radius: 16px;
      padding: 14px 18px;
      font-weight: 800;
      letter-spacing: 2px;
      cursor: pointer;
      min-width: 102px;
    }
    .copy-btn:hover { background: rgba(255,255,255,0.12); }
    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .card {
      min-height: 165px;
      border-radius: 26px;
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(8px);
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.04), transparent 50%);
      pointer-events: none;
    }
    .card.red { box-shadow: inset 0 0 0 1px rgba(255,47,62,0.65); }
    .card.yellow { box-shadow: inset 0 0 0 1px rgba(255,212,58,0.65); }
    .card.green { box-shadow: inset 0 0 0 1px rgba(73,219,102,0.65); }
    .card.blue { box-shadow: inset 0 0 0 1px rgba(62,156,255,0.65); }
    .big {
      font-size: clamp(34px, 8vw, 56px);
      font-weight: 900;
      line-height: 1;
      margin-bottom: 10px;
    }
    .big.red { color: var(--red); }
    .big.yellow { color: var(--yellow); }
    .big.green { color: var(--green); }
    .big.blue { color: var(--blue); }
    .small {
      color: rgba(255,255,255,0.5);
      letter-spacing: 4px;
      text-transform: uppercase;
      font-size: 13px;
    }
    .coin {
      position: absolute;
      font-size: 30px;
      opacity: 0.9;
      animation: drift 7s ease-in-out infinite;
      filter: drop-shadow(0 8px 10px rgba(0,0,0,0.3));
      user-select: none;
      pointer-events: none;
    }
    .coin.c1 { top: 470px; left: 12px; animation-delay: 0s; }
    .coin.c2 { top: 600px; right: 18px; animation-delay: 1s; }
    .coin.c3 { top: 740px; left: 0px; animation-delay: 2s; }
    .coin.c4 { top: 920px; right: 10px; animation-delay: 1.6s; }
    .footer {
      text-align: center;
      color: rgba(255,255,255,0.36);
      margin-top: 24px;
      font-size: 12px;
      letter-spacing: 4px;
      text-transform: uppercase;
    }
    @keyframes spin {
      from { transform: translateX(-50%) rotate(0deg); }
      to { transform: translateX(-50%) rotate(360deg); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
    }
    @keyframes drift {
      0%, 100% { transform: translateY(0px) rotate(-8deg); }
      50% { transform: translateY(-14px) rotate(10deg); }
    }
    @media (max-width: 460px) {
      .tagline { font-size: 11px; letter-spacing: 4px; }
      .ca-box { grid-template-columns: 1fr; text-align: center; }
      .cards { grid-template-columns: 1fr 1fr; gap: 12px; }
      .card { min-height: 145px; padding: 16px 12px; }
      .copy-btn { width: 100%; }
      .ca-text { white-space: normal; word-break: break-all; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title" aria-label="AUTOPILOT">
      <span>A</span><span>U</span><span>T</span><span>O</span><span>P</span><span>I</span><span>L</span><span>O</span><span>T</span>
    </div>
    <div class="tagline">The world is running itself</div>

    <div class="hero">
      <div class="ring">
        <div class="propeller">
          <div class="blade-wrap"></div>
          <div class="hub"></div>
          <div class="stem"></div>
          <div class="ball"></div>
        </div>
        <div class="face">
          <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/Trollface_non-free.png/512px-Trollface_non-free.png" alt="Autopilot face">
        </div>
      </div>
    </div>

    <div class="coin c1">🪙</div>
    <div class="coin c2">🪙</div>
    <div class="coin c3">🪙</div>
    <div class="coin c4">🪙</div>

    <div class="ca-box">
      <div class="ca-label">CA</div>
      <div class="ca-text" id="caText">2qCntyrk2jYZ1ffZAbWdibK993BViNhGtbE5sh...</div>
      <button class="copy-btn" onclick="copyCA()">COPY</button>
    </div>

    <div class="cards">
      <div class="card red">
        <div class="big red">100%</div>
        <div class="small">Automated 🌍🔥</div>
      </div>
      <div class="card yellow">
        <div class="big yellow">∞</div>
        <div class="small">Loop</div>
      </div>
      <div class="card green">
        <div class="big green">24/7</div>
        <div class="small">No brakes</div>
      </div>
      <div class="card blue">
        <div class="big blue">NPC</div>
        <div class="small">Mode</div>
      </div>
    </div>

    <div class="footer">Autopilot on Solana</div>
  </div>

  <script>
    const FULL_CA = '2qCntyrk2jYZ1ffZAbWdibK993BViNhGtbE5shREPLACE';

    function shortenCA(str) {
      if (window.innerWidth < 460) return str.slice(0, 10) + '...' + str.slice(-8);
      return str.slice(0, 32) + '...';
    }

    function renderCA() {
      document.getElementById('caText').textContent = shortenCA(FULL_CA);
    }

    function copyCA() {
      navigator.clipboard.writeText(FULL_CA).then(() => {
        const btn = document.querySelector('.copy-btn');
        const old = btn.textContent;
        btn.textContent = 'COPIED';
        setTimeout(() => btn.textContent = old, 1200);
      });
    }

    renderCA();
    window.addEventListener('resize', renderCA);
  </script>
</body>
</html>
