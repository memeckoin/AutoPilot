<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoPilot</title>
    <style>
        body {
            background-color: #ffffff;
            color: #333333;
            font-family: Arial, sans-serif;
        }
        /* Corrected CSS Variables */
        :root {
            --main-bg-color: #ffffff;
            --main-text-color: #333333;
            --highlight-color: #ff4081;
        }
        .header {
            background-color: var(--main-bg-color);
            padding: 20px;
            text-align: center;
        }
        .ticker {
            margin: 20px 0;
            font-weight: bold;
        }
        .copy-button {
            padding: 10px 20px;
            background-color: var(--highlight-color);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Welcome to AutoPilot</h1>
    </div>
    <div class="content">
        <img src="placeholder.jpg" alt="Placeholder Image" style="width:100%; height:auto;">
        <div class="ticker" id="ticker-content">Ticker: ABC123</div>
        <button class="copy-button" onclick="copyToClipboard()">Copy Ticker</button>
    </div>
    <script>
        function copyToClipboard() {
            const tickerText = document.getElementById('ticker-content').innerText;
            const textArea = document.createElement('textarea');
            textArea.value = tickerText;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            alert('Ticker copied to clipboard!');
        }
    </script>
</body>
</html>
